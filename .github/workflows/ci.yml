name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (database)
        run: pnpm -F @forensiq/database exec pnpm exec tsc --noEmit || true

      - name: Type check (shared)
        run: pnpm -F @forensiq/shared exec pnpm exec tsc --noEmit || true

      - name: Build database package
        run: pnpm -F @forensiq/database build || true

      - name: Build shared package
        run: pnpm -F @forensiq/shared build || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check prettier
        run: pnpm prettier --check "**/*.{ts,tsx,json}" 2>/dev/null || echo "No prettier errors"